  const cat = categories.find(x => x.id === c.cat);
  const icon = L.divIcon({className:'custom-marker',html:'<div class="custom-marker" style="width:16px;height:16px;background:'+cat.color+';"></div>',iconSize:[16,16],iconAnchor:[8,8]});

});

const legend = L.control({position:'bottomright'});
legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = '<h3>🎯 Catégories B2B</h3>';
  categories.forEach(c => {
    const count = companies.filter(x => x.cat === c.id).length;
    div.innerHTML += '<div class="legend-item" onclick="toggleLayer(\''+c.id+'\',this)"><div class="legend-dot" style="background:'+c.color+'"></div><span>'+c.name+'</span><span class="legend-count">('+count+')</span></div>';
  });
  div.innerHTML += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #D5D0C4;font-size:11px;color:#8B8B7A;">Total: '+companies.length+' cibles identifiées<br>🌿 = Bonsai — Montgomery Parc</div>';
  return div;
};
legend.addTo(map);

function toggleLayer(id,el){
  if(map.hasLayer(layerGroups[id])){map.removeLayer(layerGroups[id]);el.style.opacity='0.3';}
  else{map.addLayer(layerGroups[id]);el.style.opacity='1';}
}
