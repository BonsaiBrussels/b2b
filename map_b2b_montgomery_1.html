// Your gym location
const GYM = { lat: 50.8380, lng: 4.4100, name: "VOTRE SALLE DE FITNESS", addr: "Avenue de Tervuren, Montgomery" };

const map = L.map('map').setView([50.838, 4.410], 14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

// Gym marker (star)
const gymIcon = L.divIcon({
  className: '',
  html: `<div style="width:32px;height:32px;background:#1a1a2e;border-radius:50%;border:3px solid #f59e0b;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.5);">⭐</div>`,
  iconSize: [32, 32], iconAnchor: [16, 16]
});
L.marker([GYM.lat, GYM.lng], { icon: gymIcon, zIndexOffset: 1000 })
  .addTo(map)
  .bindPopup(`<b style="font-size:14px;color:#1a1a2e;">🏋️ ${GYM.name}</b><br>${GYM.addr}`);

// Category layers
const layerGroups = {};
categories.forEach(c => { layerGroups[c.id] = L.layerGroup().addTo(map); });

companies.forEach(c => {
  const cat = categories.find(x => x.id === c.cat);
  const icon = L.divIcon({
    className: 'custom-marker',
    html: `<div class="custom-marker" style="width:16px;height:16px;background:${cat.color};"></div>`,
    iconSize: [16, 16], iconAnchor: [8, 8]
  });
  L.marker([c.lat, c.lng], { icon })
    .addTo(layerGroups[c.cat])
    .bindPopup(`<b style="color:${cat.color}">${c.name}</b><br><span style="color:#666;font-size:12px">${c.addr}</span><br><span style="background:${cat.color};color:white;padding:2px 8px;border-radius:10px;font-size:11px;">${cat.name}</span>`);
});

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h3>🎯 Catégories B2B</h3>';
  categories.forEach(c => {
    const count = companies.filter(x => x.cat === c.id).length;
    div.innerHTML += `<div class="legend-item" onclick="toggleLayer('${c.id}', this)"><div class="legend-dot" style="background:${c.color}"></div><span>${c.name}</span><span class="legend-count">(${count})</span></div>`;
  });
  div.innerHTML += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #eee;font-size:11px;color:#888;">Total: ${companies.length} cibles identifiées<br>⭐ = Votre salle de fitness</div>`;
  return div;
};
legend.addTo(map);

function toggleLayer(id, el) {
  if (map.hasLayer(layerGroups[id])) {
    map.removeLayer(layerGroups[id]);
    el.style.opacity = '0.3';
  } else {
    map.addLayer(layerGroups[id]);
    el.style.opacity = '1';
  }
}
